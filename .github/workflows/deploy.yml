name: Build → GHCR → Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:        # permite lanzar manualmente desde GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/firebase-excel-manager

jobs:
  # ── 1. Build & Push a GHCR ─────────────────────────────────────────────────
  build-and-push:
    name: Build Docker image & push GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Log in a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy al VPS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy en VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Login en GHCR desde el VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Bajar imagen nueva
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Parar y eliminar contenedor anterior si existe
            docker stop firebase-excel-manager 2>/dev/null || true
            docker rm   firebase-excel-manager 2>/dev/null || true

            # Levantar contenedor nuevo
            docker run -d \
              --name firebase-excel-manager \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Limpiar imágenes viejas (libera disco)
            docker image prune -f

            echo "✅ Deploy completado: $(date)"
