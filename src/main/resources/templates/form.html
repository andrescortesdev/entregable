<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${isNew} ? 'Nuevo registro — Poli' : 'Editar registro — Poli'">Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --poli-navy: #293357;
            --poli-teal: #00A3C7;
            --poli-light: #E8F7FB;
            --poli-gray:  #F4F5F8;
        }
        * { font-family: 'Nunito', sans-serif; }
        body { background: var(--poli-gray); }

        .navbar-poli { background: var(--poli-navy); box-shadow: 0 2px 12px rgba(41,51,87,.35); }
        .navbar-poli img { height: 34px; }
        .navbar-poli .divider { width:1px; height:28px; background:rgba(255,255,255,.3); }
        .navbar-poli .crumb { color:rgba(255,255,255,.75); font-weight:600; font-size:.9rem; text-decoration:none; }
        .navbar-poli .crumb:hover { color:#fff; }
        .navbar-poli .crumb-active { color: var(--poli-teal); font-weight:700; }

        .page-header {
            background: linear-gradient(135deg, var(--poli-navy) 0%, #1c2444 100%);
            color: #fff;
            padding: 1.4rem 0 1.2rem;
        }
        .page-header h2 { font-weight:800; font-size:1.3rem; margin:0; }

        .card { border:none; border-radius:14px; box-shadow:0 2px 16px rgba(41,51,87,.09); }
        .card-header-poli {
            background: var(--poli-navy); color:#fff;
            border-radius:14px 14px 0 0 !important;
            padding:.85rem 1.4rem; font-weight:700; font-size:.95rem;
        }
        .card-header-poli i { color: var(--poli-teal); }

        .form-label { font-weight:700; font-size:.85rem; color:#444; }
        .field-icon { color: var(--poli-teal); }

        .form-control:focus, .form-select:focus {
            border-color: var(--poli-teal);
            box-shadow: 0 0 0 .2rem rgba(0,163,199,.18);
        }

        .btn-poli { background:var(--poli-teal); color:#fff; font-weight:700; border:none; border-radius:8px; }
        .btn-poli:hover { background:#0091b3; color:#fff; }
        .btn-poli-dark { background:var(--poli-navy); color:#fff; font-weight:700; border:none; border-radius:8px; }
        .btn-poli-dark:hover { background:#1c2444; color:#fff; }

        .meta-badge {
            background: var(--poli-light);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: .82rem;
            color: #555;
        }
        .meta-badge code { color: var(--poli-teal); font-weight:800; }

        .footer-poli { background:var(--poli-navy); color:rgba(255,255,255,.5); font-size:.76rem; padding:1rem 0; margin-top:2.5rem; }

        .form-section-title {
            color: var(--poli-navy);
            font-weight: 800;
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .8px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--poli-light);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav class="navbar navbar-poli px-4 py-2 d-flex align-items-center gap-3">
    <div class="d-flex align-items-center gap-3">
        <a href="/"><img src="/logo-poli.svg" alt="Poli"/></a>
        <div class="divider"></div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <a href="/" class="crumb"><i class="bi bi-house-fill me-1"></i>Inicio</a>
            <span style="color:rgba(255,255,255,.35)">/</span>
            <a th:href="@{'/collection/' + ${collectionName}}" class="crumb" th:text="${collectionName}">col</a>
            <span style="color:rgba(255,255,255,.35)">/</span>
            <span class="crumb-active" th:text="${isNew} ? 'Nuevo registro' : 'Editar'"></span>
        </div>
    </div>
</nav>

<!-- ── PAGE HEADER ── -->
<div class="page-header">
    <div class="container" style="max-width:780px">
        <div class="d-flex align-items-center gap-3">
            <div th:style="${isNew} ? 'background:#00A3C7;border-radius:10px;width:42px;height:42px;display:flex;align-items:center;justify-content:center' : 'background:#f0a500;border-radius:10px;width:42px;height:42px;display:flex;align-items:center;justify-content:center'">
                <i th:class="${isNew} ? 'bi bi-plus-lg text-white fs-5' : 'bi bi-pencil-fill text-white fs-5'"></i>
            </div>
            <div>
                <h2 th:text="${isNew} ? 'Crear nuevo registro' : 'Editar registro'"></h2>
                <small style="color:rgba(255,255,255,.6)">
                    Colección: <strong th:text="${collectionName}" style="color:var(--poli-teal)"></strong>
                </small>
            </div>
        </div>
    </div>
</div>

<!-- ── CONTENT ── -->
<div class="container py-4" style="max-width:780px">

    <!-- Meta info -->
    <div class="meta-badge d-flex align-items-center gap-3 mb-4 flex-wrap">
        <span><i class="bi bi-collection-fill me-1" style="color:var(--poli-teal)"></i>
            Colección: <code th:text="${collectionName}"></code>
        </span>
        <span th:if="${!isNew}">
            <i class="bi bi-fingerprint me-1" style="color:var(--poli-teal)"></i>
            ID: <code th:text="${docId}"></code>
        </span>
        <span>
            <i class="bi bi-list-ul me-1" style="color:var(--poli-teal)"></i>
            <span th:text="${fields.size()}">0</span> campos
        </span>
    </div>

    <div class="card">
        <div class="card-header-poli">
            <i th:class="${isNew} ? 'bi bi-plus-circle-fill me-2' : 'bi bi-pencil-fill me-2'"></i>
            <span th:text="${isNew} ? 'Datos del nuevo registro' : 'Modificar datos del registro'"></span>
        </div>
        <div class="card-body p-4">
            <form th:action="${isNew}
                    ? '/collection/' + ${collectionName} + '/create'
                    : '/collection/' + ${collectionName} + '/update/' + ${docId}"
                  method="post">

                <div th:if="${fields.isEmpty()}" class="alert alert-warning border-0">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    No se encontraron campos. Asegúrate de que la colección tiene al menos un documento.
                </div>

                <div th:if="${!fields.isEmpty()}">
                    <div class="form-section-title">
                        <i class="bi bi-tag-fill me-1"></i>Campos del registro
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6" th:each="f : ${fields}">
                            <label th:for="${f}" class="form-label">
                                <i class="bi bi-tag field-icon me-1"></i><span th:text="${f}"></span>
                            </label>
                            <input type="text"
                                   th:id="${f}"
                                   th:name="${f}"
                                   th:value="${document.get(f)}"
                                   class="form-control"
                                   th:placeholder="'Ingresa ' + ${f}"/>
                        </div>
                    </div>
                </div>

                <!-- Campos dinámicos para colección nueva/vacía -->
                <div th:if="${fields.isEmpty()}" id="dynamicFields">
                    <div class="form-section-title"><i class="bi bi-plus-square me-1"></i>Definir campos</div>
                    <div class="row g-2 mb-2 field-row">
                        <div class="col-5">
                            <input type="text" class="form-control" placeholder="Nombre del campo" name="campo_0"/>
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control" placeholder="Valor" name="valor_0"/>
                        </div>
                        <div class="col-1 d-flex align-items-center">
                            <button type="button" class="btn btn-outline-danger btn-sm rounded-circle"
                                    onclick="removeRow(this)">
                                <i class="bi bi-x"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div th:if="${fields.isEmpty()}" class="mb-4">
                    <button type="button" class="btn btn-outline-secondary btn-sm" style="border-radius:8px"
                            onclick="addField()">
                        <i class="bi bi-plus me-1"></i>Agregar campo
                    </button>
                </div>

                <hr class="my-4" style="border-color:var(--poli-light)"/>

                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-poli px-4 py-2">
                        <i th:class="${isNew} ? 'bi bi-cloud-upload-fill me-2' : 'bi bi-save-fill me-2'"></i>
                        <span th:text="${isNew} ? 'Crear registro' : 'Guardar cambios'"></span>
                    </button>
                    <a th:href="@{'/collection/' + ${collectionName}}"
                       class="btn btn-outline-secondary px-4 py-2" style="border-radius:8px;font-weight:600">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ── FOOTER ── -->
<footer class="footer-poli text-center">
    <div class="container">
        <img src="/logo-poli.svg" alt="Poli"
             style="height:22px;opacity:.6;filter:brightness(0) invert(1)" class="me-2"/>
        Politécnico Grancolombiano · Fundamentos de la Tecnología Cloud · 2026
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let fc = 1;
    function addField() {
        const c = document.getElementById('dynamicFields');
        const r = document.createElement('div');
        r.className = 'row g-2 mb-2 field-row';
        r.innerHTML = `
            <div class="col-5"><input type="text" class="form-control" placeholder="Nombre del campo" name="campo_${fc}"/></div>
            <div class="col-6"><input type="text" class="form-control" placeholder="Valor" name="valor_${fc}"/></div>
            <div class="col-1 d-flex align-items-center">
                <button type="button" class="btn btn-outline-danger btn-sm rounded-circle" onclick="removeRow(this)">
                    <i class="bi bi-x"></i></button></div>`;
        c.appendChild(r);
        fc++;
    }
    function removeRow(btn) { btn.closest('.field-row').remove(); }
</script>
</body>
</html>
