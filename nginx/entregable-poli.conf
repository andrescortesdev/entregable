# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name entregable-poli.andrescortes.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name entregable-poli.andrescortes.dev;

    # ── SSL (Let's Encrypt via Certbot) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/entregable-poli.andrescortes.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entregable-poli.andrescortes.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Headers de seguridad ─────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # ── Límite de tamaño de upload (debe coincidir con Spring) ───────────────
    client_max_body_size 55M;

    # ── Proxy al contenedor Spring Boot ──────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        # Buffer para respuestas grandes (tablas con muchos registros)
        proxy_buffer_size        16k;
        proxy_buffers            8 16k;
        proxy_busy_buffers_size  32k;
    }

    # ── Archivos estáticos cacheados en el navegador ─────────────────────────
    location ~* \.(css|js|svg|png|ico|woff2?)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/entregable-poli.access.log;
    error_log  /var/log/nginx/entregable-poli.error.log warn;
}
